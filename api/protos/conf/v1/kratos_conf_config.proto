syntax = "proto3";

package conf.v1;

option go_package = "github.com/kalandramo/kratos-bootstrap/api/gen/go/conf/v1;conf";

import "google/protobuf/duration.proto";

// 远程配置服务
message RemoteConfig {
  // 配置服务类型
  enum Type {
    TYPE_UNSPECIFIED = 0; // 未指定
    TYPE_NACOS = 1;       // Nacos
  }

  // Nacos 配置
  message Nacos {
    string address = 1;    // 服务端地址
    uint64 port = 2;       // 服务端端口

    string username = 3;   // 用户名
    string password = 4;   // 密码

    string namespace_id = 10; // 命名空间 ID
    string group = 11;        // 配置分组
    string data_id = 12;      // 配置数据 ID

    string log_level = 20;    // 日志级别
    string cache_dir = 21;    // 缓存目录
    string log_dir = 22;      // 日志目录

    bool not_load_cache_at_start = 30;  // 启动时不加载缓存
    bool update_cache_when_empty = 31;  // 当配置为空时更新缓存

    int32 update_thread_num = 40;              // 更新服务的线程数
    google.protobuf.Duration timeout = 41;     // HTTP 请求超时时间
    google.protobuf.Duration beat_interval = 42; // 心跳间隔时间
  }

  string type = 1; // 配置类型
  optional Nacos nacos = 2;
}
