syntax = "proto3";

package conf.v1;

option go_package = "github.com/kalandramo/kratos-bootstrap/api/gen/go/conf/v1;conf";

import "google/protobuf/timestamp.proto";

// 应用/实例信息
message AppInfo {
  // 项目唯一标识（小写 + 连字符，如 gowind、finance）
  string project = 1;
  // 纯微服务名（小写 + 连字符，如：user-service、admin-service）
  string app_id = 2;
  // 实例 ID，比如：gowind-user-service@172.16.0.12:8080@ajk2n8d3789z
  string instance_id = 3;
  // 「项目名 + 服务名」的自然语言描述，比如：Gowind用户服务、Gowind管理服务
  string name = 4;
  // 语义化版本号（SemVer），：v1.2.3、2.0.0-beta
  string version = 5;

  // 运行时信息
  string hostname = 10;                      // 主机名
  repeated Endpoint endpoints = 11;          // 服务端点列表
  google.protobuf.Timestamp start_time = 12; // 启动时间

  // 部署/环境/标签
  string environment = 20;              // 运行环境：dev/stage/prod
  string region = 21;                   // 区域
  string zone = 22;                     // 可用区
  map<string, string> labels = 23;      // 标签映射

  // 构建信息
  string build_id = 30;  // 构建 ID
  string git_commit = 31; // Git 提交哈希

  // 任意键值元数据
  map<string, string> metadata = 40; // 元数据映射
}

// 服务访问端点
message Endpoint {
  string kind = 1;    // 端点类型，如：grpc、http、metrics
  string address = 2; // 端点地址，如：10.0.0.1:8080 或 http://host:8080
}
