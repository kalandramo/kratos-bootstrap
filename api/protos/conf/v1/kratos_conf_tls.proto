syntax = "proto3";

package conf.v1;

option go_package = "github.com/kalandramo/kratos-bootstrap/api/gen/go/conf/v1;conf";

// TLS 配置
message TLS {
  // 文件方式加载 TLS 证书
  message File {
    optional string cert_path = 1; // 证书文件路径
    optional string key_path = 2;  // 私钥文件路径
    optional string ca_path = 3;   // CA 证书文件路径
  }

  // 内存方式加载 TLS 证书
  message Config {
    optional bytes cert_pem = 1; // 证书 PEM 内容
    optional bytes key_pem = 2;  // 私钥 PEM 内容
    optional bytes ca_pem = 3;   // CA 证书 PEM 内容
  }

  optional File file = 1;         // 文件方式配置
  optional Config config = 2;     // 内存方式配置
  bool insecure_skip_verify = 3;  // 跳过证书验证（不推荐用于生产环境）
}
