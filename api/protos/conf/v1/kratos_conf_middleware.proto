syntax = "proto3";

package conf.v1;

option go_package = "github.com/kalandramo/kratos-bootstrap/api/gen/go/conf/v1;conf";

import "google/protobuf/duration.proto";

// 中间件配置
message Middleware {
  // JWT 认证配置
  message Auth {
    string method = 1;  // JWT 签名算法，支持：HS256
    string key = 2;     // JWT 秘钥

    optional google.protobuf.Duration access_token_expires = 3;  // 访问令牌过期时间
    optional google.protobuf.Duration refresh_token_expires = 4; // 刷新令牌过期时间

    optional string access_token_key_prefix = 5;  // 访问令牌键前缀
    optional string refresh_token_key_prefix = 6; // 刷新令牌键前缀
  }

  // 性能指标配置
  message Metrics {
    bool histogram = 1; // 直方图
    bool counter = 2;   // 计数器
    bool gauge = 3;     // 仪表盘
    bool summary = 4;   // 摘要
  }

  Metrics metrics = 2;          // 性能指标
  Auth auth = 3;                // JWT 认证

  bool enable_logging = 10;     // 日志开关
  bool enable_recovery = 11;    // 异常恢复开关
  bool enable_validate = 12;    // 参数校验开关
  bool enable_limiter = 13;     // 限流器开关（Kratos v3 默认使用 BBR 限流器）
  bool enable_circuit_breaker = 14; // 熔断器开关
  bool enable_metadata = 15;    // 元数据开关
}
